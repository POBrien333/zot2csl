name: Generate Zotero to CSL Mappings HTML

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 6 * * 1'  # Runs weekly on Mondays at 06:00 UTC

permissions:
  contents: write

jobs:
  generate-html:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate HTML output
        run: |
          python generate_zot2csl.py
          mkdir -p docs
          mv index.html docs/index.html

      - name: Commit and push if the HTML changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to the generated HTML. Nothing to commit."
          else
            git commit -m "Update Zotero to CSL HTML mapping"
            git push
          fi
